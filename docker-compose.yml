version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: proptech-postgres
    environment:
      POSTGRES_DB: proptech
      POSTGRES_USER: proptech_user
      POSTGRES_PASSWORD: proptech_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptech_user -d proptech"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proptech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
